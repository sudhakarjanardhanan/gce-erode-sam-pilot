name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: echo "Type-checking via build step"

      - name: Build
        run: npm run build
        env:
          # Build requires these to be set even without a real DB at build time
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sam_dev
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production
          NEXTAUTH_URL: http://localhost:3000
