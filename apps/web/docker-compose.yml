services:
  postgres:
    image: postgres:16-alpine
    container_name: sam-web-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sam_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sam_web_postgres_data:/var/lib/postgresql/data

volumes:
  sam_web_postgres_data:
